syntax = "proto3";

option csharp_namespace = "Contracts.Protos.Client.CompanyManager";

package client.company_manager;

service CompanyManager {
    rpc CreateCompany (CreateCompanyRequest) returns (CreateCompanyResponse);
    rpc SetCompanyPublicKey (SetCompanyPublicKeyRequest) returns (SetCompanyPublicKeyResponse);
    rpc GetCompanyPublicKey (GetCompanyPublicKeyRequest) returns (GetCompanyPublicKeyResponse);
}

message CreateCompanyRequest {
    string master_key = 1;
    string company_name = 2;
    string company_email = 3;
}

message CreateCompanyResponse {
    int32 status = 1;
    string message = 2;
    string registration_code = 3;
}

message SetCompanyPublicKeyRequest {
    string registration_code = 1;
    string company_public_key_pem = 2;
}

message SetCompanyPublicKeyResponse {
    int32 status = 1;
    string message = 2;
}

message GetCompanyPublicKeyRequest {
    string registration_code = 1;
}

message GetCompanyPublicKeyResponse {
    int32 status = 1;
    string message = 2;
    string company_public_key_pem = 3;
}