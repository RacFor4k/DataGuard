syntax = "proto3";

option csharp_namespace = "Contracts.Protos.Auth";

package auth;

// Определение сервиса аутентификации.
service Authentication {
  // Регистрирует нового пользователя
  rpc Register (RegisterRequest) returns (RegisterResponse);

  // Установка зашифрованного ключа пользователя мастер-ключом
  rpc SetMasterKey (SetMasterKeyRequest) returns (SetMasterKeyResponse);

  // Вход существующего пользователя
  rpc Login (LoginRequest) returns (LoginResponse);

  // Обновление токена пользователя
  rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);

  // Создание кода регистрации
  rpc CreateRegistrationCode (CreateRegistrationCodeRequest) returns (CreateRegistrationCodeResponse);
}

// Запрос на регистрацию пользователя
message RegisterRequest {
  string registration_code = 1; // 12 символов nanoid (Английский алфавит и цифры)
  bytes encrypted_password = 2; // от 8 до 18 символов (зашифрованный)
  bytes encrypted_key = 3; // зашифрованный ключ
  bytes password_hash = 4; // хэш ключа
  bytes client_salt = 5; // салон клиента
}

// Ответ на запрос регистрации пользователя
message RegisterResponse {
  int32 status = 1;
  string message = 2;
  bytes public_master_key = 3; // публичный мастер-ключ
  string jwt_refresh_token = 4;
  string jwt_access_token = 5;
}

// Запрос на установку зашифрованного ключа пользователя мастер-ключом
message SetMasterKeyRequest {
  bytes master_key = 1; // мастер-ключ
}

// Ответ на запрос установки зашифрованного ключа пользователя мастер-ключом
message SetMasterKeyResponse {
  int32 status = 1;
  string message = 2;
  string jwt_refresh_token = 3;
  string jwt_access_token = 4;
}

// Запрос на вход пользователя
message LoginRequest {
  string user_id = 1;
  bytes password_hash = 2;
  string nonce_token = 3;
}

// Ответ на запрос входа пользователя
message LoginResponse {
  int32 status = 1;
  string message = 2;
  bytes encrypted_key = 3;
  string jwt_refresh_token = 4;
  string jwt_access_token = 5;
}

// Запрос на обновление токена пользователя
message RefreshTokenRequest {
}

// Ответ на запрос обновления токена пользователя
message RefreshTokenResponse {
  int32 status = 1;
  string message = 2;
  string jwt_access_token = 3;
}

// Запрос на создание кода регистрации
message CreateRegistrationCodeRequest {
  string name = 1;
  string surname = 2;
  string email = 3;
  repeated string groups = 4;
  repeated string admin_groups = 5;
}

// Ответ на запрос создания кода регистрации
message CreateRegistrationCodeResponse {
  int32 status = 1;
  string message = 2;
  string registration_code = 3;
}
