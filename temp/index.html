<!DOCTYPE html>
<!--
  Точка входа — аналог Program.cs / App.axaml.cs (BuildAvaloniaApp + MainWindow).
  Имитирует desktop-окно DataGuard Manager: 1280×760 (min 960×600), центрированное,
  содержит MainWindowView.html (через iframe).
-->
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataGuard Manager</title>
  <link rel="stylesheet" href="Client.Styles/Themes/DataGuardTheme.css" />
  <style>
    /* Страница-«хост»: фон вокруг окна (как рабочий стол ОС). */
    html, body {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2a2a2e;
    }

    /* Desktop-окно: Title + клиентская область.
       Width=1280, Height=760, MinWidth=960, MinHeight=600, Title="DataGuard Manager". */
    .desktop-window {
      width: 1280px;
      height: 760px;
      min-width: 960px;
      min-height: 600px;
      max-width: 100vw;
      max-height: 100vh;
      background: var(--app-background-brush);
      border: 1px solid #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      resize: both;            /* имитация изменяемого размера окна ОС */
    }

    /* Заголовок окна (TitleBar) — несёт Title и базовый декор. */
    .titlebar {
      height: 32px;
      flex: 0 0 auto;
      background: var(--sidebar-background-brush);
      border-bottom: 1px solid var(--border-brush);
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--secondary-text-brush);
      user-select: none;
    }

    /* Клиентская область окна — MainWindow (ContentControl корня). */
    .client-area {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
    }
    #mainWindow {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Desktop-окно DataGuard Manager. -->
  <div class="desktop-window">

    <!-- Заголовок окна (Title="DataGuard Manager"). -->
    <div class="titlebar">DataGuard Manager</div>

    <!-- Клиентская область: MainWindow. -->
    <div class="client-area">
      <iframe id="mainWindow" src="Client.Manager/Views/MainWindowView.html" title="DataGuard Manager"></iframe>
    </div>
  </div>

</body>
</html>
