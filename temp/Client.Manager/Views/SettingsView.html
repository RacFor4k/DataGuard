<!DOCTYPE html>
<!--
  Корневое представление раздела настроек.

-->
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Настройки — DataGuard Manager</title>
  <link rel="stylesheet" href="../../Client.Styles/Themes/DataGuardTheme.css" />

</head>
<body class="user-control">

  <!-- Основная область раздела настроек с отступами. -->

      <div class="placeholder-title">Настройки</div>

      <div class="placeholder-desc">Плейсхолдер настроек приложения DataGuard Manager.</div>
