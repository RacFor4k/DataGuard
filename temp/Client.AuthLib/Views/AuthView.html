<!DOCTYPE html>
<!--
  Корневой UserControl экрана авторизации.
  Перенос AuthView.axaml — shell-обёртка с ContentControl (текущая дочерняя ViewModel).
  AuthViewModel стартует с LoginViewModel → iframe src=LoginView.html.
-->
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Авторизация — DataGuard</title>
  <link rel="stylesheet" href="../../Client.Styles/Themes/DataGuardTheme.css" />
  <style>
    /* ContentControl во весь экран. */
    .auth-shell { width: 100vw; height: 100vh; background: var(--app-background-brush); overflow: hidden; }
    #authContent { width: 100%; height: 100%; border: 0; display: block; }
  </style>
</head>
<body class="user-control">

  <!-- ContentControl отображает текущую дочернюю модель представления из процесса авторизации. -->
  <div class="auth-shell">
    <iframe id="authContent" src="LoginView.html" title="Экран авторизации"></iframe>
  </div>

  <script src="AuthView.js"></script>
</body>
</html>
