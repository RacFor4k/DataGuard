<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataGuard</title>

    <script type="module" crossorigin src="/assets/index-BdkXal_6.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-XXPmO1Cy.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
      <script>
(function() {
    // Функция применения стиля к одному элементу
    function styleUiIcon(el) {
        if (el instanceof SVGElement) {
            el.style.fill = 'var(--text-primary)';
        } else {
            // Если внутри есть SVG — стилизуем его
            const svg = el.querySelector('svg');
            if (svg) {
                svg.style.fill = 'var(--text-primary)';
            } else {
                // На случай шрифтовых иконок
                el.style.color = 'var(--text-primary)';
            }
        }
    }

    // Обработка всех существующих .ui-icon
    document.querySelectorAll('.ui-icon').forEach(styleUiIcon);

    // Наблюдатель за изменениями в DOM
    const observer = new MutationObserver((mutations) => {
        for (const mutation of mutations) {
            if (mutation.type === 'childList') {
                // Ищем новые .ui-icon в добавленных узлах
                for (const node of mutation.addedNodes) {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        const element = /** @type {HTMLElement} */ (node);
                        if (element.classList?.contains('ui-icon')) {
                            styleUiIcon(element);
                        }
                        // Также ищем внутри добавленных элементов
                        const icons = element.querySelectorAll?.('.ui-icon') || [];
                        icons.forEach(styleUiIcon);
                    }
                }
            }
        }
    });

    // Запускаем наблюдение за всем деревом
    observer.observe(document.body, {
        childList: true,
        subtree: true
    });
})();
</script>
</html>
