global:
  # DEV
  scrape_interval: 10s
  evaluation_interval: 10s

  # RELEASE
  # scrape_interval: 30s
  # scrape_timeout: 10s
  # evaluation_interval: 30s

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
      
  